on:
  workflow_dispatch: ~
  push:
    branches: [main]
  pull_request: ~
  schedule:
    - cron: '0 0 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.4, 8.5]
        sapi: [cli, fpm]
    steps:
      - name: Get current timestamp
        id: timestamp
        run: echo "rfc3339=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v6

      - name: Login against a Docker registry
        uses: docker/login-action@v4
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            PHP_SAPI=${{ matrix.sapi }}
          tags: ghcr.io/drps/php:${{ matrix.php }}-${{ matrix.sapi }}
          push: ${{ github.ref == 'refs/heads/main' && github.repository_owner == 'drps' }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.created=${{ steps.timestamp.outputs.rfc3339 }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
